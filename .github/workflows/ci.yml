name: CI

# Build, lint and test on GitHub Actions. Uses the native actions/checkout (no SSH
# deploy key) and a MongoDB service container instead of downloading a mongod binary
# via mongodb-memory-server. npm publishing is handled by the separate release.yml
# workflow, triggered on version tags and using OIDC trusted publishing (no token).

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      # Point the test suite at the MongoDB service container. Without this variable
      # the suite falls back to mongodb-memory-server (used for local development).
      MONGO_URI: mongodb://localhost:27017/idempotency-test

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run prettier

      - name: Compile
        run: npm run compile

      - name: Test
        run: npm test
